name: Deploy BullMQ Worker to Google Cloud Run

# Required Service Account Permissions:
# The service account (GCP_SA_KEY) needs the following IAM roles:
# 1. Artifact Registry Writer (roles/artifactregistry.writer)
#    - To push Docker images to Artifact Registry
# 2. Cloud Run Admin (roles/run.admin)
#    - To deploy and manage Cloud Run services
# 3. Service Account User (roles/iam.serviceAccountUser)
#    - To act as the Cloud Run service account (if using a custom SA)
#
# Alternative: Use the predefined role "Cloud Run Admin" which includes most permissions
# Or grant these specific permissions:
# - artifactregistry.repositories.uploadArtifacts
# - run.services.create
# - run.services.update
# - run.services.get
# - run.services.delete (optional, for rollbacks)
# - iam.serviceAccounts.actAs (if using custom service account)
#
# Required GitHub Secrets:
# The following secrets must be configured in GitHub repository settings:
# - GCP_PROJECT_ID: Google Cloud Project ID
# - GCP_SA_KEY: Service account key JSON for deployment
# - REDIS_URL: Redis connection URL (required for BullMQ workers)
# - NEXTCLOUD_URL: Nextcloud instance URL (for deal folder operations)
# - NEXTCLOUD_USER: Nextcloud username
# - NEXTCLOUD_PASSWORD: Nextcloud password

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: bullmq-worker
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Authorize Docker push
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f apps/worker/Dockerfile \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/investor-portal/bullmq-worker:${{ github.sha }} \
            --push .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/investor-portal/bullmq-worker:${{ github.sha }} \
              --platform managed \
              --region ${{ env.REGION }} \
              --allow-unauthenticated \
              --cpu-always-allocated \
              --min-instances=1 \
              --max-instances=10 \
              --memory=512Mi \
              --cpu=1 \
              --timeout=3600s \
              --set-env-vars "NODE_ENV=production,REDIS_URL=${{ secrets.REDIS_URL }},NEXTCLOUD_URL=${{ secrets.NEXTCLOUD_URL }},NEXTCLOUD_USER=${{ secrets.NEXTCLOUD_USER }},NEXTCLOUD_PASSWORD=${{ secrets.NEXTCLOUD_PASSWORD }}"

