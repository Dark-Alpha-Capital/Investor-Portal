name: Deploy Investor Portal Server to Google Cloud Run

# Required Service Account Permissions:
# The service account (GCP_SA_KEY) needs the following IAM roles:
# 1. Artifact Registry Writer (roles/artifactregistry.writer)
#    - To push Docker images to Artifact Registry
# 2. Cloud Run Admin (roles/run.admin)
#    - To deploy and manage Cloud Run services
# 3. Service Account User (roles/iam.serviceAccountUser)
#    - To act as the Cloud Run service account (if using a custom SA)
#
# Alternative: Use the predefined role "Cloud Run Admin" which includes most permissions
# Or grant these specific permissions:
# - artifactregistry.repositories.uploadArtifacts
# - run.services.create
# - run.services.update
# - run.services.get
# - run.services.delete (optional, for rollbacks)
# - iam.serviceAccounts.actAs (if using custom service account)
#
# Required GitHub Secrets:
# The following secrets must be configured in GitHub repository settings:
# - GCP_PROJECT_ID: Google Cloud Project ID
# - GCP_SA_KEY: Service account key JSON for deployment
# - DATABASE_URL: PostgreSQL database connection string
# - CORS_ORIGIN: Allowed CORS origin URL (e.g., https://yourdomain.com)
# - GCLOUD_PROJECT_ID: Google Cloud Project ID (for GCS)
# - GCS_CLIENT_EMAIL: Google Cloud Storage service account email
# - GCS_PRIVATE_KEY: Google Cloud Storage service account private key (newline characters will be handled)
# - GCLOUD_BUCKET: Google Cloud Storage bucket name
# - REDIS_URL: Redis connection URL (if using Redis)

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: server
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Authorize Docker push
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f apps/server/Dockerfile \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/investor-portal/investor-portal:${{ github.sha }} \
            --push .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/investor-portal/investor-portal:${{ github.sha }} \
              --platform managed \
              --region ${{ env.REGION }} \
              --allow-unauthenticated \
              --set-env-vars "NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},CORS_ORIGIN=${{ secrets.CORS_ORIGIN }},GCLOUD_PROJECT_ID=${{ secrets.GCLOUD_PROJECT_ID }},GCS_CLIENT_EMAIL=${{ secrets.GCS_CLIENT_EMAIL }},GCS_PRIVATE_KEY=${{ secrets.GCS_PRIVATE_KEY }},GCLOUD_BUCKET=${{ secrets.GCLOUD_BUCKET }},REDIS_URL=${{ secrets.REDIS_URL }}" \
              --timeout=900s